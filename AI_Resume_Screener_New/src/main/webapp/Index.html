<!DOCTYPE html>

<html>
<head>
    <title>AI Resume Screener</title>
    <meta charset="UTF-8">

```
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
```

</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

```
    <!-- TITLE -->
    <h1 class="logo-text">AI Resume Screener</h1>
    <p class="subtitle">Smart AI Powered Hiring System</p>

    <!-- MESSAGE BOX -->
    <p id="msgBox" style="text-align:center; font-weight:bold;"></p>

    <!-- ================= LOGIN ================= -->
    <form action="LoginServlet" method="post">

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <hr>

    <!-- ================= REGISTER ================= -->
    <h3 style="text-align:center;">Register</h3>

    <form action="RegisterServlet" method="post">

        <!-- ✅ NAME FIELD ADDED -->
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>
        </div>

        <button type="submit" class="login-btn">Register</button>
    </form>

</div>
```

</div>

<!-- ================= MESSAGE SCRIPT ================= -->

<script>
window.onload = function() {

    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    const box = document.getElementById("msgBox");

    if(msg === "success"){
        box.innerText = " Registration Successful!";
        box.style.color = "green";
    }
    else if(msg === "error"){
        box.innerText = " Something went wrong!";
        box.style.color = "red";
    }
};
</script>

</body>
</html>
